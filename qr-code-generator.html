<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d9ff;
            --primary-dark: #0099cc;
            --bg-dark: #0f1419;
            --bg-card: #1a202c;
            --bg-input: #252f3f;
            --border: #2d3748;
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --accent: #ff006e;
            --success: #00d084;
            --danger: #ff4757;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2332 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.5rem;
            animation: slideUp 0.6s ease-out 0.1s both;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"],
        select {
            flex: 1;
            background: var(--bg-input);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 1rem;
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-input);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        select {
            min-width: 120px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        button {
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--bg-dark);
            border: 2px solid transparent;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 217, 255, 0.3);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(0, 217, 255, 0.05);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* QR Modal */
        .qr-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.3s ease-out;
        }

        .qr-modal-overlay.active {
            display: flex;
        }

        .qr-modal {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        .qr-modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
        }

        .qr-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        .qr-info {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
        }

        .qr-code-container {
            margin: 1.5rem 0;
            padding: 1.2rem;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-code-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            image-rendering: pixelated;
        }

        .qr-divider {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 1.5rem 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .qr-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .qr-btn {
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .qr-btn-download {
            background: var(--success);
            color: white;
        }

        .qr-btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 208, 132, 0.3);
        }

        .qr-btn-copy {
            background: rgba(0, 217, 255, 0.1);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .qr-btn-copy:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .qr-btn-close {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .qr-btn-close:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(0, 217, 255, 0.05);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .toast.show {
            opacity: 1;
            pointer-events: auto;
            animation: slideUp 0.3s ease-out;
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 {
                font-size: 2rem;
            }

            .qr-modal {
                padding: 1.5rem;
            }

            button {
                padding: 0.85rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QR Code</h1>
            <p>Convert any text or URL into a scannable QR code</p>
        </div>

        <div class="form-group">
            <label for="textInput">Enter text or URL</label>
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="textInput" 
                    placeholder="https://example.com or any text..."
                    autocomplete="off"
                >
                <select id="sizeSelect">
                    <option value="300">Small</option>
                    <option value="400" selected>Medium</option>
                    <option value="500">Large</option>
                    <option value="600">XL</option>
                </select>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="generateBtn">Generate QR</button>
            <button class="btn-secondary" id="clearBtn">Clear</button>
        </div>
    </div>

    <!-- QR Modal -->
    <div class="qr-modal-overlay" id="qrOverlay">
        <div class="qr-modal">
            <div class="qr-title">Your QR Code</div>
            <div class="qr-info" id="qrInfo"></div>
            <div class="qr-code-container">
                <img id="qrImg" class="qr-code-img" alt="QR Code">
            </div>
            <div class="qr-divider">Actions</div>
            <div class="qr-actions">
                <button class="qr-btn qr-btn-download" id="downloadBtn">📥 Download QR Code</button>
                <button class="qr-btn qr-btn-copy" id="copyTextBtn">📋 Copy Text</button>
            </div>
            <button class="qr-btn qr-btn-close" id="closeBtn">Close</button>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script>
        // DOM Elements
        const textInput = document.getElementById('textInput');
        const sizeSelect = document.getElementById('sizeSelect');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const qrOverlay = document.getElementById('qrOverlay');
        const qrImg = document.getElementById('qrImg');
        const qrInfo = document.getElementById('qrInfo');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyTextBtn = document.getElementById('copyTextBtn');
        const closeBtn = document.getElementById('closeBtn');
        const toast = document.getElementById('toast');

        // State
        let currentQRData = '';

        // Generate QR Code
        function generateQR() {
            const text = textInput.value.trim();
            if (!text) {
                showToast('Please enter some text or a URL', false);
                return;
            }

            currentQRData = text;
            const size = sizeSelect.value;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&ecc=H`;

            qrImg.src = qrUrl;
            qrInfo.textContent = text.length > 100 ? text.substring(0, 100) + '...' : text;
            qrOverlay.classList.add('active');
        }

        // Close Modal
        function closeModal() {
            qrOverlay.classList.remove('active');
        }

        // Download QR Code
        function downloadQR() {
            const text = textInput.value.trim();
            const size = sizeSelect.value;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&ecc=H&format=png`;
            
            const link = document.createElement('a');
            link.href = qrUrl;
            link.download = `qr-code-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('QR Code downloaded!', true);
        }

        // Copy Text to Clipboard
        function copyToClipboard() {
            const text = currentQRData;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard!', true);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        // Fallback copy for older browsers
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('Copied to clipboard!', true);
            } catch (err) {
                showToast('Failed to copy', false);
            }
            document.body.removeChild(textarea);
        }

        // Show Toast Notification
        function showToast(message, isSuccess = false) {
            toast.textContent = message;
            toast.classList.toggle('success', isSuccess);
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Clear Form
        function clearForm() {
            textInput.value = '';
            textInput.focus();
            closeModal();
        }

        // Event Listeners
        generateBtn.addEventListener('click', generateQR);
        clearBtn.addEventListener('click', clearForm);
        closeBtn.addEventListener('click', closeModal);
        downloadBtn.addEventListener('click', downloadQR);
        copyTextBtn.addEventListener('click', copyToClipboard);

        // Enter key to generate
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateQR();
            }
        });

        // Close modal on overlay click
        qrOverlay.addEventListener('click', (e) => {
            if (e.target === qrOverlay) {
                closeModal();
            }
        });

        // Focus input on load
        textInput.focus();
    </script>

  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
