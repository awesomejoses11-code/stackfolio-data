<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackFolio Live HTML Previewer</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    
    :root {
      --gold: #FFD700;
      --deep-blue: #050814;
      --panel-blue: #0B1126;
      --border-blue: rgba(255, 215, 0, 0.1);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--deep-blue);
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(255, 215, 0, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(0, 210, 255, 0.04) 0%, transparent 40%);
      color: #F8FAFC;
    }

    .editor-container {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    #code-editor {
      resize: none;
      white-space: pre;
      overflow-x: auto;
    }

    #line-numbers::-webkit-scrollbar,
    #console-logs::-webkit-scrollbar,
    #code-editor::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    #code-editor::-webkit-scrollbar-track, #console-logs::-webkit-scrollbar-track {
      background: transparent;
    }
    #code-editor::-webkit-scrollbar-thumb, #console-logs::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }

    .glass {
      background: rgba(11, 17, 38, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-blue);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #1E293B;
      transition: .3s;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--gold);
    }
    input:checked + .slider:before {
      transform: translateX(22px);
      background-color: #050814;
    }

    .loading-spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="h-screen flex flex-col justify-between overflow-hidden">

  <header class="p-4 glass border-b border-white/5 flex flex-wrap justify-between items-center gap-4 z-40 shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-[#FFD700] to-[#B8860B] flex items-center justify-center text-black font-black shadow-lg shadow-yellow-500/10">
        SF
      </div>
      <div>
        <h1 class="text-xs font-black uppercase tracking-[0.2em] text-white/40 leading-none">StackFolio Workspace</h1>
        <p class="text-sm font-bold text-[#FFD700] mt-1">Live HTML Previewer</p>
      </div>
    </div>

    <div class="flex flex-wrap items-center gap-3 sm:gap-4">
      <div class="flex items-center gap-2.5 bg-black/40 px-3.5 py-1.5 rounded-xl border border-white/5">
        <span class="text-[10px] sm:text-xs text-slate-400 font-bold tracking-wide uppercase">Execute JS</span>
        <label class="switch">
          <input type="checkbox" id="js-toggle" checked onchange="toggleJsExecution()" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="flex items-center gap-2">
        <button onclick="injectPreset('counter')" class="bg-white/5 hover:bg-white/10 text-slate-300 px-3 py-1.5 rounded-lg border border-white/5 text-xs font-semibold transition-all">
          <i class="fa-solid fa-square-plus mr-1 text-yellow-500"></i> Counter
        </button>
        <button onclick="injectPreset('tailwind')" class="bg-white/5 hover:bg-white/10 text-slate-300 px-3 py-1.5 rounded-lg border border-white/5 text-xs font-semibold transition-all">
          <i class="fa-solid fa-wand-magic-sparkles mr-1 text-[#00D2FF]"></i> Tailwind
        </button>
      </div>
    </div>
  </header>

  <div class="bg-[#070b1d] border-b border-white/5 px-4 py-2 flex items-center justify-between shrink-0">
    <div class="flex gap-1.5 bg-black/30 p-1 rounded-xl border border-white/5">
      <button onclick="setWorkspaceView('editor')" id="view-tab-editor" class="text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2 bg-yellow-500 text-black shadow-lg shadow-yellow-500/10">
        <i class="fa-solid fa-code"></i> Code Editor
      </button>
      <button onclick="setWorkspaceView('preview')" id="view-tab-preview" class="text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2 text-slate-400 hover:text-white">
        <i class="fa-solid fa-eye"></i> Live Preview
      </button>
      <button onclick="setWorkspaceView('split')" id="view-tab-split" class="hidden md:flex text-xs font-bold py-2 px-4 rounded-lg transition-all items-center gap-2 text-slate-400 hover:text-white">
        <i class="fa-solid fa-columns"></i> Split View
      </button>
    </div>

    <div class="flex items-center gap-2">
      <button onclick="copyCode()" class="text-xs text-slate-400 hover:text-white transition-colors flex items-center gap-1.5 font-bold bg-white/5 px-3 py-2 rounded-lg border border-white/5">
        <i class="fa-solid fa-copy text-yellow-500"></i> Copy Source
      </button>
      <button onclick="downloadCode()" class="text-xs text-[#050814] bg-gradient-to-tr from-[#FFD700] to-[#FDB931] hover:brightness-110 px-3.5 py-2 rounded-lg font-black uppercase transition-all flex items-center gap-1.5">
        <i class="fa-solid fa-download"></i> Download .html
      </button>
    </div>
  </div>

  <main class="flex-1 p-4 min-h-0 flex flex-col gap-4 relative">
    
    <div id="workspace-wrapper" class="flex-1 grid grid-cols-1 gap-4 min-h-0">
      
      <div id="panel-editor" class="flex flex-col h-full bg-[#080d20] border border-white/5 rounded-2xl overflow-hidden shadow-2xl">
        <div class="px-4 py-2.5 bg-[#0a1129] border-b border-white/5 flex justify-between items-center shrink-0">
          <span class="text-[11px] font-extrabold uppercase tracking-widest text-slate-400 flex items-center gap-2">
            <i class="fa-solid fa-align-left text-yellow-500"></i> HTML/CSS/JS Source Code
          </span>
          <button onclick="clearEditor()" class="text-[10px] text-red-400 hover:text-red-300 transition-colors flex items-center gap-1 font-bold bg-red-500/10 px-2 py-1 rounded-md">
            <i class="fa-solid fa-eraser"></i> Reset Code
          </button>
        </div>

        <div class="flex-1 flex editor-container overflow-hidden bg-[#040714] text-slate-300">
          <div id="line-numbers" class="w-12 py-4 select-none text-right pr-3 text-slate-600 font-mono bg-black/20 border-r border-white/5 overflow-hidden">
            <div>1</div>
          </div>
          <textarea id="code-editor" autocomplete="off" autofocus spellcheck="false" 
            class="flex-1 py-4 px-3 bg-transparent outline-none border-none text-slate-200 resize-none overflow-y-auto leading-relaxed"
            placeholder="Write your HTML, CSS, and JS here..."></textarea>
        </div>
      </div>

      <div id="panel-preview" class="hidden flex flex-col h-full bg-[#080d20] border border-white/5 rounded-2xl overflow-hidden shadow-2xl">
        <div class="px-4 py-2.5 bg-[#0a1129] border-b border-white/5 flex justify-between items-center shrink-0">
          <span class="text-[11px] font-extrabold uppercase tracking-widest text-slate-400 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            Sandboxed Viewport
          </span>
          <span id="preview-status" class="text-[10px] text-slate-500 font-mono">Initializing...</span>
        </div>

        <div class="flex-1 bg-white relative overflow-hidden">
          <iframe id="preview-frame" title="Live Preview" class="w-full h-full border-none bg-white"></iframe>
        </div>
      </div>

    </div>

    <div id="panel-console" class="bg-[#080d20] border border-white/5 rounded-xl overflow-hidden shadow-2xl flex flex-col transition-all duration-300 h-10 shrink-0">
      <div onclick="toggleConsole()" class="px-4 py-2 bg-[#0a1129] border-b border-white/5 flex justify-between items-center cursor-pointer select-none">
        <div class="flex items-center gap-3">
          <span class="text-[11px] font-extrabold uppercase tracking-widest text-slate-400 flex items-center gap-1.5">
            <i class="fa-solid fa-terminal text-emerald-400"></i> Console Output
          </span>
          <span class="text-[10px] bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded font-mono font-bold">
            <span id="log-count">0</span> logs
          </span>
        </div>
        <i class="fa-solid fa-chevron-down text-slate-500 text-xs transition-transform" id="console-toggle-icon"></i>
      </div>
      <div id="console-content" class="overflow-y-auto flex-1 bg-black/30 p-3 hidden">
        <div id="console-logs" class="space-y-1 font-mono text-xs"></div>
      </div>
    </div>

  </main>

  <!-- Toast Notification -->
  <div id="toast-card" class="fixed bottom-6 left-6 bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 translate-y-20 opacity-0 pointer-events-none transition-all duration-300 z-50">
    <i id="toast-icon" class="fa-solid fa-circle-check text-lg"></i>
    <span id="toast-text" class="text-sm font-semibold">Done!</span>
  </div>

  <script>
    // ============================================================================
    // DOM ELEMENT REFERENCES
    // ============================================================================
    const editor = document.getElementById('code-editor');
    const lineNumbers = document.getElementById('line-numbers');
    const previewFrame = document.getElementById('preview-frame');
    const previewStatus = document.getElementById('preview-status');
    const jsToggle = document.getElementById('js-toggle');
    const workspaceWrapper = document.getElementById('workspace-wrapper');
    const consoleLogs = document.getElementById('console-logs');
    const logCount = document.getElementById('log-count');

    // ============================================================================
    // STATE VARIABLES
    // ============================================================================
    let currentViewMode = 'editor';
    let debounceTimer = null;
    let consoleIsOpen = false;
    let logCounter = 0;

    // ============================================================================
    // DEFAULT TEMPLATES
    // ============================================================================
    const defaultTemplate = `<!DOCTYPE html>
<html>
<head>
  <title>Counter App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 { color: #333; margin: 0 0 30px 0; }
    .counter { font-size: 48px; font-weight: bold; color: #667eea; margin: 20px 0; }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #764ba2; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Counter App</h1>
    <div class="counter" id="counter">0</div>
    <button onclick="increment()">+</button>
    <button onclick="decrement()">−</button>
    <button onclick="reset()">Reset</button>
  </div>

  <script>
    let count = 0;
    const counterDisplay = document.getElementById('counter');

    function increment() {
      count++;
      counterDisplay.textContent = count;
    }

    function decrement() {
      count--;
      counterDisplay.textContent = count;
    }

    function reset() {
      count = 0;
      counterDisplay.textContent = count;
    }
  <\/script>
</body>
</html>`;

    const tailwindTemplate = `<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <span class="text-white text-2xl font-bold">✨</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">Tailwind Ready</h1>
        <p class="text-gray-600 mt-2">Start building with utility classes</p>
      </div>

      <div class="space-y-4 mb-8">
        <div class="bg-indigo-50 border-l-4 border-indigo-600 p-4 rounded">
          <h3 class="font-semibold text-indigo-900">Responsive Design</h3>
          <p class="text-sm text-indigo-800">Mobile-first utilities included</p>
        </div>
        <div class="bg-purple-50 border-l-4 border-purple-600 p-4 rounded">
          <h3 class="font-semibold text-purple-900">Dark Mode</h3>
          <p class="text-sm text-purple-800">Built-in dark mode support</p>
        </div>
      </div>

      <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition">
        Get Started
      </button>
    </div>
  </div>
</body>
</html>`;

    // ============================================================================
    // INITIALIZATION
    // ============================================================================
    window.addEventListener('DOMContentLoaded', () => {
      try {
        // Load Default Code
        editor.value = defaultTemplate;
        
        // Setup events
        editor.addEventListener('input', handleEditorInput);
        editor.addEventListener('scroll', syncScroll);
        
        // Init viewports
        updateLineNumbers();
        
        // Give iframe time to initialize, then load preview
        setTimeout(() => {
          triggerPreviewUpdate();
        }, 100);
        
        // Handle workspace layout orientation resizing safely
        window.addEventListener('resize', () => {
          if (window.innerWidth < 768 && currentViewMode === 'split') {
            setWorkspaceView('editor');
          }
        });

        showToast('Editor ready!', 'check');
      } catch (error) {
        console.error('Initialization error:', error);
        showToast('Error initializing editor', 'exclamation');
      }
    });

    // ============================================================================
    // VIEW MODE MANAGEMENT
    // ============================================================================
    function setWorkspaceView(mode) {
      try {
        currentViewMode = mode;
        
        const tabEditor = document.getElementById('view-tab-editor');
        const tabPreview = document.getElementById('view-tab-preview');
        const tabSplit = document.getElementById('view-tab-split');

        const panelEditor = document.getElementById('panel-editor');
        const panelPreview = document.getElementById('panel-preview');

        // Clear all active tab buttons
        [tabEditor, tabPreview, tabSplit].forEach(tab => {
          if (tab) {
            tab.className = "text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2 text-slate-400 hover:text-white";
          }
        });

        // Show/Hide Panels depending on selection
        if (mode === 'editor') {
          tabEditor.className = "text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2 bg-yellow-500 text-black shadow-lg shadow-yellow-500/10";
          workspaceWrapper.className = "flex-1 grid grid-cols-1 gap-4 min-h-0";
          panelEditor.classList.remove('hidden');
          panelPreview.classList.add('hidden');
        } 
        else if (mode === 'preview') {
          tabPreview.className = "text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2 bg-yellow-500 text-black shadow-lg shadow-yellow-500/10";
          workspaceWrapper.className = "flex-1 grid grid-cols-1 gap-4 min-h-0";
          panelEditor.classList.add('hidden');
          panelPreview.classList.remove('hidden');
          triggerPreviewUpdate();
        } 
        else if (mode === 'split') {
          tabSplit.className = "text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2 bg-yellow-500 text-black shadow-lg shadow-yellow-500/10";
          workspaceWrapper.className = "flex-1 grid grid-cols-2 gap-4 min-h-0";
          panelEditor.classList.remove('hidden');
          panelPreview.classList.remove('hidden');
          triggerPreviewUpdate();
        }
      } catch (error) {
        console.error('View mode error:', error);
      }
    }

    // ============================================================================
    // EDITOR FUNCTIONS
    // ============================================================================
    function handleEditorInput() {
      try {
        updateLineNumbers();
        
        window.clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          triggerPreviewUpdate();
        }, 300);
      } catch (error) {
        console.error('Editor input error:', error);
      }
    }

    function updateLineNumbers() {
      try {
        const lines = editor.value.split('\n').length;
        let numbersHtml = '';
        for (let i = 1; i <= lines; i++) {
          numbersHtml += `<div>${i}</div>`;
        }
        lineNumbers.innerHTML = numbersHtml;
        syncScroll();
      } catch (error) {
        console.error('Line numbers error:', error);
      }
    }

    function syncScroll() {
      try {
        lineNumbers.scrollTop = editor.scrollTop;
      } catch (error) {
        console.error('Scroll sync error:', error);
      }
    }

    function clearEditor() {
      try {
        editor.value = `<!DOCTYPE html>
<html>
<head>
  <title>Empty Canvas</title>
</head>
<body>
  <h2>Empty Sandbox Canvas</h2>
</body>
</html>`;
        handleEditorInput();
        showToast('Workspace reset', 'eraser');
      } catch (error) {
        console.error('Clear editor error:', error);
      }
    }

    // ============================================================================
    // PREVIEW FUNCTIONS (OPTIMIZED)
    // ============================================================================
    function triggerPreviewUpdate() {
      try {
        previewStatus.textContent = 'Rendering...';
        
        const isJsEnabled = jsToggle.checked;
        const code = editor.value.trim();

        if (!code) {
          previewStatus.textContent = 'Empty code';
          return;
        }

        // Configure sandbox based on JS toggle
        if (isJsEnabled) {
          previewFrame.setAttribute('sandbox', 'allow-scripts allow-same-origin');
        } else {
          previewFrame.setAttribute('sandbox', 'allow-same-origin');
        }

        // Use requestAnimationFrame for smooth rendering
        requestAnimationFrame(() => {
          try {
            previewFrame.srcdoc = code;
            
            // Set up iframe console capture
            previewFrame.onload = () => {
              try {
                if (previewFrame.contentWindow) {
                  // Capture console logs from iframe
                  const iframeConsole = previewFrame.contentWindow.console;
                  const originalLog = iframeConsole.log;
                  const originalError = iframeConsole.error;
                  const originalWarn = iframeConsole.warn;

                  iframeConsole.log = function(...args) {
                    originalLog.apply(iframeConsole, args);
                    addLog('log', args);
                  };
                  iframeConsole.error = function(...args) {
                    originalError.apply(iframeConsole, args);
                    addLog('error', args);
                  };
                  iframeConsole.warn = function(...args) {
                    originalWarn.apply(iframeConsole, args);
                    addLog('warn', args);
                  };

                  previewStatus.textContent = 'Live ✓';
                }
              } catch (e) {
                previewStatus.textContent = 'Rendered (console blocked)';
              }
            };
          } catch (error) {
            previewStatus.textContent = 'Render error';
            console.error('Preview render error:', error);
            addLog('error', ['Preview error: ' + error.message]);
          }
        });
      } catch (error) {
        console.error('Preview update error:', error);
        previewStatus.textContent = 'Error';
        addLog('error', ['Update error: ' + error.message]);
      }
    }

    function toggleJsExecution() {
      try {
        triggerPreviewUpdate();
        showToast(jsToggle.checked ? 'JavaScript enabled' : 'JavaScript blocked', 'shield');
      } catch (error) {
        console.error('JS toggle error:', error);
      }
    }

    // ============================================================================
    // CONSOLE LOGGING
    // ============================================================================
    function addLog(type, args) {
      try {
        const logDiv = document.createElement('div');
        logDiv.className = type === 'error' ? 'text-red-400' : type === 'warn' ? 'text-yellow-400' : 'text-green-400';
        
        const message = args.map(arg => {
          if (typeof arg === 'object') {
            try {
              return JSON.stringify(arg);
            } catch {
              return String(arg);
            }
          }
          return String(arg);
        }).join(' ');
        
        logDiv.textContent = `[${type}] ${message}`;
        consoleLogs.appendChild(logDiv);
        logCounter++;
        logCount.textContent = logCounter;
        
        // Auto scroll to bottom
        consoleLogs.parentElement.scrollTop = consoleLogs.parentElement.scrollHeight;
      } catch (error) {
        console.error('Logging error:', error);
      }
    }

    function toggleConsole() {
      try {
        const panelConsole = document.getElementById('panel-console');
        const consoleContent = document.getElementById('console-content');
        const toggleIcon = document.getElementById('console-toggle-icon');
        consoleIsOpen = !consoleIsOpen;

        if (consoleIsOpen) {
          panelConsole.classList.remove('h-10');
          consoleContent.classList.remove('hidden');
          toggleIcon.style.transform = 'rotate(0deg)';
        } else {
          panelConsole.classList.add('h-10');
          consoleContent.classList.add('hidden');
          toggleIcon.style.transform = 'rotate(-180deg)';
        }
      } catch (error) {
        console.error('Console toggle error:', error);
      }
    }

    // ============================================================================
    // TEMPLATE INJECTION
    // ============================================================================
    function injectPreset(type) {
      try {
        if (type === 'counter') {
          editor.value = defaultTemplate;
        } else if (type === 'tailwind') {
          editor.value = tailwindTemplate;
        }
        
        handleEditorInput();
        showToast('Template injected!', 'bolt');
      } catch (error) {
        console.error('Template injection error:', error);
      }
    }

    // ============================================================================
    // CLIPBOARD & DOWNLOAD
    // ============================================================================
    function copyCode() {
      try {
        const text = editor.value;
        if (!text) {
          showToast('Nothing to copy', 'alert-circle');
          return;
        }

        navigator.clipboard.writeText(text).then(() => {
          showToast('Copied to clipboard!', 'copy');
        }).catch(() => {
          // Fallback
          const temp = document.createElement('textarea');
          temp.value = text;
          document.body.appendChild(temp);
          temp.select();
          document.execCommand('copy');
          document.body.removeChild(temp);
          showToast('Copied to clipboard!', 'copy');
        });
      } catch (error) {
        console.error('Copy error:', error);
        showToast('Copy failed', 'alert-circle');
      }
    }

    function downloadCode() {
      try {
        const text = editor.value;
        if (!text) {
          showToast('Nothing to download', 'alert-circle');
          return;
        }

        const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'stackfolio_preview.html';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        showToast('File downloaded!', 'download');
      } catch (error) {
        console.error('Download error:', error);
        showToast('Download failed', 'alert-circle');
      }
    }

    // ============================================================================
    // TOAST NOTIFICATIONS
    // ============================================================================
    function showToast(text, iconClass = 'circle-check') {
      try {
        const box = document.getElementById('toast-card');
        const icon = document.getElementById('toast-icon');
        const textSpan = document.getElementById('toast-text');

        icon.className = `fa-solid fa-${iconClass}`;
        textSpan.innerText = text;

        box.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
        window.clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => {
          box.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
        }, 2500);
      } catch (error) {
        console.error('Toast error:', error);
      }
    }
  </script>
</body>
</html>
